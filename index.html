<!DOCTYPE html>
<html>
<head>
  <title>Student Companion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Student Companion</h1>

  <!-- Quote Section -->
  <div class="card">
    <h2>Motivation</h2>
    <p id="quote">Loading...</p>
    <p id="author"></p>
  </div>
<div class="card">
  <h2>Add Task</h2>
  <input type="text" id="task" placeholder="Enter task">
  <input type="time" id="time">
  <button onclick="addTask()">Set Alarm</button>
</div>

<div class="card">
  <h2>Search Topic</h2>
  <input type="text" id="topic" placeholder="Enter topic">
  <button onclick="searchTopic()">Search</button>
</div>

<div class="card">
  <h2>Daily Schedule</h2>
  <input type="text" id="scheduleTask" placeholder="Task">
  <input type="time" id="scheduleTime">
  <button onclick="addSchedule()">Add</button>

  <ul id="scheduleList"></ul>
</div>

<div class="card">
  <h2>Indian Leaders</h2>

  <p><b>Mahatma Gandhi</b> - Father of Nation</p>
  <p><b>Swami Vivekananda</b> - Spiritual Leader</p>
  <p><b>APJ Abdul Kalam</b> - Missile Man of India</p>
  <p><b>Bhagat Singh</b> - Revolutionary Freedom Fighter</p>

</div>

<div class="card">
  <h2>Meditation Music</h2>

  <iframe width="250" height="150"
  src="https://www.youtube.com/embed/2OEL4P1Rz04"
  frameborder="0" allowfullscreen>
  </iframe>

</div>

  <script src="script.js"></script>
</body>
</html>
